<html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派信娱乐 - 引领游戏潮流</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.544.0/dist/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kaiti', 'STKaiti', 'KaiTi', '楷体', sans-serif;
            background-color: #000;
            overflow-x: hidden;
            min-height: 100vh;
            width: 100vw;
        }

        /* 流星背景 */
        #meteor-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 圆圈层 */
        #circles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 200%;
            z-index: 1;
            pointer-events: none;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.15), transparent 70%);
            box-shadow: 
                0 0 10px rgba(255, 255, 255, 0.2),
                inset 0 0 10px rgba(255, 255, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(100px, -50px) rotate(90deg);
            }
            50% {
                transform: translate(50px, 100px) rotate(180deg);
            }
            75% {
                transform: translate(-50px, 50px) rotate(270deg);
            }
        }

        /* 内容容器 */
        .content-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 5vh 0 10vh;
            gap: 3vh;
        }

        /* 标题样式 */
        .title-section {
            text-align: center;
            margin-bottom: 0.5vh;
        }

        .main-title {
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: clamp(0.9rem, 1.8vw, 1.3rem);
            color: #aaa;
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        /* 语言选择器样式 */
        .language-selector {
            position: relative;
            z-index: 10;
        }

        .language-button {
            padding: 0.3rem 0.8rem;
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .language-button:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .language-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.3rem;
            background-color: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            overflow: hidden;
            min-width: 100px;
            backdrop-filter: blur(10px);
        }

        .language-option {
            padding: 0.5rem 1rem;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-align: center;
        }

        .language-option:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .language-option:first-child {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hidden {
            display: none;
        }

        /* 图片和按钮区域 */
        .images-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 100%;
            max-width: 500px;
            padding-bottom: 2rem;
        }

        .image-button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
        }

        .square-image {
            width: 60%;
            aspect-ratio: 1;
            background-color: #111;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .square-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .square-image:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        /* 响应式设计 - 移动端优化 */
        @media (max-width: 768px) {
            .content-container {
                padding: 3vh 0 8vh;
                gap: 2vh;
            }
            
            .main-title {
                font-size: clamp(2rem, 12vw, 4rem);
            }
            
            .subtitle {
                font-size: clamp(0.8rem, 3vw, 1.1rem);
                margin-top: 0.3rem;
            }
            
            .images-section {
                gap: 1.5rem;
                max-width: 350px;
            }
            
            .image-button-group {
                gap: 0.8rem;
            }
            
            .square-image {
                width: 55%;
            }
            
            .action-button {
                padding: 0.4rem 1rem;
                font-size: 0.75rem;
                max-width: 140px;
            }
            
            .official-intro-text,
            .shareholder-query-text,
            .game-preview-text {
                width: 55%;
                font-size: 1.5rem;
            }
        }
        
        /* 按钮样式 */
        .action-button {
            padding: 0.7rem 1.5rem;
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 180px;
            backdrop-filter: blur(10px);
        }

        .action-button:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .action-button:active {
            transform: translateY(0);
        }

        /* 官方介绍文字样式 */
        .official-intro-text {
            width: 60%;
            aspect-ratio: 2/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(22, 163, 74, 0.3));
            border: 1px solid rgba(34, 197, 94, 0.5);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.8), 0 0 20px rgba(34, 197, 94, 0.6);
            box-shadow: 
                0 0 15px rgba(34, 197, 94, 0.5),
                inset 0 0 15px rgba(34, 197, 94, 0.2);
            margin: 0 auto;
        }

        .official-intro-text:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 10px 25px rgba(34, 197, 94, 0.6),
                inset 0 0 20px rgba(34, 197, 94, 0.3);
            text-shadow: 0 0 15px rgba(34, 197, 94, 1), 0 0 30px rgba(34, 197, 94, 0.8);
        }

        .official-intro-text:active {
            transform: translateY(0);
        }

        /* 股东查询文字样式 */
        .shareholder-query-text {
            width: 60%;
            aspect-ratio: 2/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(220, 38, 38, 0.3));
            border: 1px solid rgba(239, 68, 68, 0.5);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.8), 0 0 20px rgba(239, 68, 68, 0.6);
            box-shadow: 
                0 0 15px rgba(239, 68, 68, 0.5),
                inset 0 0 15px rgba(239, 68, 68, 0.2);
            margin: 0 auto;
        }

        .shareholder-query-text:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 10px 25px rgba(239, 68, 68, 0.6),
                inset 0 0 20px rgba(239, 68, 68, 0.3);
            text-shadow: 0 0 15px rgba(239, 68, 68, 1), 0 0 30px rgba(239, 68, 68, 0.8);
        }

        .shareholder-query-text:active {
            transform: translateY(0);
        }

        /* 游戏预览文字样式 */
        .game-preview-text {
            width: 60%;
            aspect-ratio: 2/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, rgba(66, 153, 225, 0.2), rgba(29, 78, 216, 0.3));
            border: 1px solid rgba(59, 130, 246, 0.5);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.8), 0 0 20px rgba(59, 130, 246, 0.6);
            box-shadow: 
                0 0 15px rgba(59, 130, 246, 0.5),
                inset 0 0 15px rgba(59, 130, 246, 0.2);
            margin: 0 auto;
        }

        .game-preview-text:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 10px 25px rgba(59, 130, 246, 0.6),
                inset 0 0 20px rgba(59, 130, 246, 0.3);
            text-shadow: 0 0 15px rgba(59, 130, 246, 1), 0 0 30px rgba(59, 130, 246, 0.8);
        }

        .game-preview-text:active {
            transform: translateY(0);
        }

        /* 语言选择器容器 */
        .language-selector-container {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- 音效元素 -->
    <audio id="ding-sound" preload="auto" volume="0.5">

    </audio>
    <audio id="language-sound" preload="auto" volume="0.5">
        <source src="https://assets.mixkit.co/active_storage/sfx/2014/2014-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- 流星背景 -->
    <canvas id="meteor-background"></canvas>

    <!-- 圆圈层 -->
    <div id="circles-container">
        <div class="circle" style="width: 300px; height: 300px; top: 10%; left: 10%; animation-delay: 0s;"></div>
        <div class="circle" style="width: 200px; height: 200px; top: 50%; right: 15%; animation-delay: -5s;"></div>
        <div class="circle" style="width: 250px; height: 250px; bottom: 20%; left: 20%; animation-delay: -10s;"></div>
    </div>

    <!-- 内容容器 -->
    <div class="content-container">
        <!-- 标题部分 -->
        <div class="title-section">
            <h1 class="main-title">派信娱乐</h1>
            <div class="language-selector relative">
                <button id="language-toggle" class="language-button">
                    <span id="current-language">简体中文</span>
                    <i data-lucide="chevron-down" class="ml-1 w-4 h-4"></i>
                </button>
                <div id="language-dropdown" class="language-dropdown hidden">
                    <div class="language-option" data-lang="zh">简体中文</div>
                    <div class="language-option" data-lang="en">English</div>
                </div>
            </div>
            <p class="subtitle" style="color: rgb(240, 237, 237); font-size: 14px;">引领派生态游戏潮流</p>
        </div>

        <!-- 图片和按钮部分 -->
        <div class="images-section">
            <div class="image-button-group">
                <div class="official-intro-text" onclick="handleButtonClick(1)">派生态官方</div>
                <button class="action-button" onclick="handleButtonClick(1)">官方介绍</button>
            </div>

            <div class="image-button-group">
                <div class="shareholder-query-text" onclick="handleButtonClick(2)">生态股东查询</div>
                <button class="action-button" onclick="handleButtonClick(2)">股东查询器</button>
            </div>

            <div class="image-button-group">
                <div class="game-preview-text" onclick="handleButtonClick(3)">游戏预览</div>
                <button class="action-button" onclick="handleButtonClick(3)">app模拟</button>
            </div>
        </div>
    </div>

    <script>
        // 流星背景动画
        const canvas = document.getElementById('meteor-background');
        const ctx = canvas.getContext('2d');

        // 设置canvas尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 流星类
        class Meteor {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.length = Math.random() * 100 + 50;
                this.speed = Math.random() * 5 + 3;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.angle = Math.PI / 4 + (Math.random() * Math.PI / 6 - Math.PI / 12);
                this.size = Math.random() * 2 + 1;
            }

            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                if (this.y > canvas.height || this.x < -this.length || this.x > canvas.width + this.length) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = this.size;
                ctx.stroke();

                // 流星尾巴
                const gradient = ctx.createLinearGradient(
                    this.x, this.y,
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0.3)');
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.size * 3;
                ctx.stroke();
                ctx.restore();
            }
        }

        // 创建流星
        const meteors = [];
        for (let i = 0; i < 20; i++) {
            meteors.push(new Meteor());
        }

        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            meteors.forEach(meteor => {
                meteor.update();
                meteor.draw();
            });
            
            requestAnimationFrame(animate);
        }

        animate();

        // 播放音效函数
        function playSound(soundId) {
            const sound = document.getElementById(soundId);
            sound.currentTime = 0;
            sound.volume = 0.5;
            sound.play().then(() => {
                console.log(`${soundId} 音效播放成功`);
            }).catch(error => {
                console.log(`无法播放 ${soundId} 音效:`, error);
                // 如果自动播放被阻止，尝试用户交互后播放
                setTimeout(() => {
                    sound.play().catch(e => console.log(`二次尝试播放 ${soundId} 失败:`, e));
                }, 100);
            });
        }

        // 按钮点击处理
        function handleButtonClick(buttonId) {
            // 根据按钮ID播放不同音效
            const soundMap = {
                1: 'ding-sound',
                2: 'dong-sound',
                3: 'game-sound'
            };
            
            playSound(soundMap[buttonId] || 'click-sound');
            
            const actions = {
                1: () => window.location.href = 'https://pixinyuleguangfang.pages.dev/',
                2: () => window.location.href = 'https://picinyulegudong.pages.dev/',
                3: () => window.location.href = 'https://pixinyule.pages.dev/'
            };
            
            if (actions[buttonId]) {
                actions[buttonId]();
            }
        }

        // 语言切换功能
        const languageToggle = document.getElementById('language-toggle');
        const languageDropdown = document.getElementById('language-dropdown');
        const currentLanguage = document.getElementById('current-language');
        const languageOptions = document.querySelectorAll('.language-option');

        // 定义中英文翻译映射
        const translations = {
            zh: {
                'main-title': '派信娱乐',
                'subtitle': '引领派生态游戏潮流',
                'official-intro-text': '派生态官方',
                'official-button': '官方介绍',
                'shareholder-text': '生态股东查询',
                'shareholder-button': '股东查询器',
                'game-text': '游戏预览',
                'game-button': 'app模拟',
                'language-zh': '简体中文',
                'language-en': 'English'
            },
            en: {
                'main-title': 'PAIXIN ENTERTAINMENT',
                'subtitle': 'Leading Pi Ecosystem Gaming',
                'official-intro-text': 'Pi Ecosystem Official',
                'official-button': 'Official Intro',
                'shareholder-text': 'Ecosystem Shareholder Query',
                'shareholder-button': 'Shareholder Query',
                'game-text': 'Game Preview',
                'game-button': 'App Simulation',
                'language-zh': '简体中文',
                'language-en': 'English'
            }
        };

        // 切换语言函数
        function switchLanguage(lang) {
            // 更新主标题
            document.querySelector('.main-title').textContent = translations[lang]['main-title'];
            
            // 更新副标题
            document.querySelector('.subtitle').textContent = translations[lang]['subtitle'];
            
            // 更新官方介绍文字和按钮
            document.querySelector('.official-intro-text').textContent = translations[lang]['official-intro-text'];
            document.querySelectorAll('.image-button-group')[0].querySelector('.action-button').textContent = translations[lang]['official-button'];
            
            // 更新股东查询文字和按钮
            document.querySelector('.shareholder-query-text').textContent = translations[lang]['shareholder-text'];
            document.querySelectorAll('.image-button-group')[1].querySelector('.action-button').textContent = translations[lang]['shareholder-button'];
            
            // 更新游戏预览文字和按钮
            document.querySelector('.game-preview-text').textContent = translations[lang]['game-text'];
            document.querySelectorAll('.image-button-group')[2].querySelector('.action-button').textContent = translations[lang]['game-button'];
            
            // 更新语言选择器
            document.querySelector('[data-lang="zh"]').textContent = translations[lang]['language-zh'];
            document.querySelector('[data-lang="en"]').textContent = translations[lang]['language-en'];
            
            // 保存当前语言设置到本地存储
            localStorage.setItem('currentLanguage', lang);
        }

        // 切换下拉菜单显示/隐藏
        languageToggle.addEventListener('click', () => {
            languageDropdown.classList.toggle('hidden');
        });

        // 选择语言
        languageOptions.forEach(option => {
            option.addEventListener('click', () => {
                const lang = option.getAttribute('data-lang');
                currentLanguage.textContent = option.textContent;
                languageDropdown.classList.add('hidden');
                
                // 播放语言切换音效
                playSound('language-sound');

                // 切换语言
                switchLanguage(lang);
            });
        });

        // 点击页面其他地方关闭下拉菜单
        document.addEventListener('click', (event) => {
            if (!languageToggle.contains(event.target) && !languageDropdown.contains(event.target)) {
                languageDropdown.classList.add('hidden');
            }
        });

        // 初始化Lucide图标
        lucide.createIcons();

        // 页面加载后自动刷新一次（仅在首次访问时）
        if (!localStorage.getItem('pageRefreshed')) {
            setTimeout(() => {
                localStorage.setItem('pageRefreshed', 'true');
                window.location.reload();
            }, 1000); // 1秒后刷新
        } else {
            // 从本地存储加载保存的语言设置
            const savedLanguage = localStorage.getItem('currentLanguage') || 'zh';
            switchLanguage(savedLanguage);
            currentLanguage.textContent = savedLanguage === 'zh' ? '简体中文' : 'English';
        }
    </script>

</body></html>
