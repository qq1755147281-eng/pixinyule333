<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派信娱乐 - 引领游戏潮流</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.544.0/dist/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kaiti', 'STKaiti', 'KaiTi', '楷体', sans-serif;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* 流星背景 */
        #meteor-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 圆圈层 */
        #circles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.15), transparent 70%);
            box-shadow: 
                0 0 10px rgba(255, 255, 255, 0.2),
                inset 0 0 10px rgba(255, 255, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(100px, -50px) rotate(90deg);
            }
            50% {
                transform: translate(50px, 100px) rotate(180deg);
            }
            75% {
                transform: translate(-50px, 50px) rotate(270deg);
            }
        }

        /* 内容容器 */
        .content-container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 1vh 0 5vh;
            gap: 1.5vh;
        }

        /* 标题样式 */
        .title-section {
            text-align: center;
            margin-bottom: 0.5vh;
        }

        .main-title {
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: clamp(0.9rem, 1.8vw, 1.3rem);
            color: #aaa;
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        /* 语言选择器样式 */
        .language-selector {
            position: relative;
            z-index: 10;
        }

        .language-button {
            padding: 0.3rem 0.8rem;
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .language-button:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .language-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.3rem;
            background-color: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            overflow: hidden;
            min-width: 100px;
            backdrop-filter: blur(10px);
        }

        .language-option {
            padding: 0.5rem 1rem;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-align: center;
        }

        .language-option:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .language-option:first-child {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hidden {
            display: none;
        }

        /* 图片和按钮区域 */
        .images-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            width: 100%;
            max-width: 450px;
            flex: 1;
            justify-content: flex-start;
        }

        .image-button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            width: 100%;
        }

        .square-image {
            width: 50%;
            aspect-ratio: 1;
            background-color: #111;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .square-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .square-image:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        /* 响应式设计 - 移动端优化 */
        @media (max-width: 768px) {
            .content-container {
                padding: 1vh 0 3vh;
                gap: 1.5vh;
            }
            
            .main-title {
                font-size: clamp(2rem, 12vw, 4rem);
            }
            
            .subtitle {
                font-size: clamp(0.8rem, 3vw, 1.1rem);
                margin-top: 0.3rem;
            }
            
            .images-section {
                gap: 1rem;
                max-width: 350px;
            }
            
            .image-button-group {
                gap: 0.6rem;
            }
            
            .square-image {
                width: 45%;
            }
            
            .action-button {
                padding: 0.4rem 1rem;
                font-size: 0.75rem;
                max-width: 140px;
            }
        }
        
        /* 按钮样式 */
        .action-button {
            padding: 0.5rem 1.2rem;
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 160px;
            backdrop-filter: blur(10px);
        }

        .action-button:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .action-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- 音效元素 -->
    <audio id="click-sound" preload="auto" volume="0.5">
        <source src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- 流星背景 -->
    <canvas id="meteor-background"></canvas>

    <!-- 圆圈层 -->
    <div id="circles-container">
        <div class="circle" style="width: 300px; height: 300px; top: 10%; left: 10%; animation-delay: 0s;"></div>
        <div class="circle" style="width: 200px; height: 200px; top: 50%; right: 15%; animation-delay: -5s;"></div>
        <div class="circle" style="width: 250px; height: 250px; bottom: 20%; left: 20%; animation-delay: -10s;"></div>
    </div>

    <!-- 内容容器 -->
    <div class="content-container">
        <!-- 标题部分 -->
        <div class="title-section">
            <div class="flex items-center justify-center gap-4">
                <h1 class="main-title">派信娱乐</h1>
                <div class="language-selector relative">
                    <button id="language-toggle" class="language-button">
                        <span id="current-language">简体中文</span>
                        <i data-lucide="chevron-down" class="ml-1 w-4 h-4"></i>
                    </button>
                    <div id="language-dropdown" class="language-dropdown hidden">
                        <div class="language-option" data-lang="zh">简体中文</div>
                        <div class="language-option" data-lang="en">English</div>
                    </div>
                </div>
            </div>
            <p class="subtitle" style="color: rgb(240, 237, 237); font-size: 14px;">引领派生态游戏潮流</p>
        </div>

        <!-- 图片和按钮部分 -->
        <div class="images-section">
            <div class="image-button-group">
                <div class="square-image">
                    <img src="https://p26-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/c5874978f57f40f59e40a8f8320d12de~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260307184708989DBDAB08ED83FE1BC8&rrcfp=f06b921b&x-expires=1775472451&x-signature=dzYkuldZ0VtPtrMKcgkfRM7eYP0%3D" alt="官方介绍">
                </div>
                <button class="action-button" onclick="handleButtonClick(1)">官方介绍</button>
            </div>

            <div class="image-button-group">
                <div class="square-image">
                    <img src="https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/f6c2cbe63fae466b9132c97e08942d9e~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260307184708989DBDAB08ED83FE1BC8&rrcfp=f06b921b&x-expires=1775472451&x-signature=4CleUm40WNi%2FX3ueqqaFTu1h5yA%3D" alt="股东查询">
                </div>
                <button class="action-button" onclick="handleButtonClick(2)">股东查询器</button>
            </div>

            <div class="image-button-group">
                <div class="square-image">
                    <img src="https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/bfdddb88f13942d9e~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260307184708989DBDAB08ED83FE1BC8&rrcfp=f06b921b&x-expires=1775472451&x-signature=z25UpUIe6vtp8YVcZdacfYjIzqU%3D" alt="APP模拟预览">
                </div>
                <button class="action-button" onclick="handleButtonClick(3)">app模拟</button>
            </div>
        </div>
    </div>

    <script>
        // 流星背景动画
        const canvas = document.getElementById('meteor-background');
        const ctx = canvas.getContext('2d');

        // 设置canvas尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 流星类
        class Meteor {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.length = Math.random() * 100 + 50;
                this.speed = Math.random() * 5 + 3;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.angle = Math.PI / 4 + (Math.random() * Math.PI / 6 - Math.PI / 12);
                this.size = Math.random() * 2 + 1;
            }

            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                if (this.y > canvas.height || this.x < -this.length || this.x > canvas.width + this.length) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = this.size;
                ctx.stroke();

                // 流星尾巴
                const gradient = ctx.createLinearGradient(
                    this.x, this.y,
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0.3)');
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.size * 3;
                ctx.stroke();
                ctx.restore();
            }
        }

        // 创建流星
        const meteors = [];
        for (let i = 0; i < 20; i++) {
            meteors.push(new Meteor());
        }

        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            meteors.forEach(meteor => {
                meteor.update();
                meteor.draw();
            });
            
            requestAnimationFrame(animate);
        }

        animate();

        // 按钮点击处理
        function handleButtonClick(buttonId) {
            // 播放点击音效
            const clickSound = document.getElementById('click-sound');
            clickSound.currentTime = 0;
            clickSound.volume = 0.5; // 确保音量适中
            clickSound.play().then(() => {
                console.log('音效播放成功');
            }).catch(error => {
                console.log('无法播放音效:', error);
                // 如果自动播放被阻止，尝试用户交互后播放
                setTimeout(() => {
                    clickSound.play().catch(e => console.log('二次尝试播放失败:', e));
                }, 100);
            });
            
            const actions = {
                1: () => window.location.href = 'https://games-gameannouncement.netlify.app/',
                2: () => window.location.href = 'https://games-code-stockholder.netlify.app/',
                3: () => window.location.href = 'https://games-code.netlify.app/'
            };
            
            if (actions[buttonId]) {
                actions[buttonId]();
            }
        }

        // 语言切换功能
        const languageToggle = document.getElementById('language-toggle');
        const languageDropdown = document.getElementById('language-dropdown');
        const currentLanguage = document.getElementById('current-language');
        const languageOptions = document.querySelectorAll('.language-option');

        // 切换下拉菜单显示/隐藏
        languageToggle.addEventListener('click', () => {
            languageDropdown.classList.toggle('hidden');
        });

        // 选择语言
        languageOptions.forEach(option => {
            option.addEventListener('click', () => {
                const lang = option.getAttribute('data-lang');
                currentLanguage.textContent = option.textContent;
                languageDropdown.classList.add('hidden');
                
                // 播放点击音效
                const clickSound = document.getElementById('click-sound');
                clickSound.currentTime = 0;
                clickSound.volume = 0.5;
                clickSound.play().catch(error => {
                    console.log('无法播放音效:', error);
                });

                // 这里可以添加实际的语言切换逻辑
                console.log('切换到语言:', lang);
            });
        });

        // 点击页面其他地方关闭下拉菜单
        document.addEventListener('click', (event) => {
            if (!languageToggle.contains(event.target) && !languageDropdown.contains(event.target)) {
                languageDropdown.classList.add('hidden');
            }
        });

        // 初始化Lucide图标
        lucide.createIcons();

        // 页面加载后自动刷新一次（仅在首次访问时）
        if (!localStorage.getItem('pageRefreshed')) {
            setTimeout(() => {
                localStorage.setItem('pageRefreshed', 'true');
                window.location.reload();
            }, 1000); // 1秒后刷新
        }
    </script>
</body>
</html>
